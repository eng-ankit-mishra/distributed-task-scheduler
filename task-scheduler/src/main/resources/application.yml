spring:
  application:
    name: task-scheduler

  datasource:
    url: jdbc:postgresql://localhost:5432/taskscheduler
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379


server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics