spring:
  application:
    name: task-scheduler

  datasource:
    url: jdbc:postgresql://localhost:5432/taskscheduler
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: secret
    listener:
      simple:
        acknowledge-mode: auto      # auto-ack on success, nack on exception
        retry:
          enabled: false            # We handle retry manually in the consumer
        prefetch: 1


server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  jwt:
    secret: "x4swQUtV4JUn0fsCMOXXGPkxfkyqmNva9F/towHa7ns="
    expiration-ms: 86400000